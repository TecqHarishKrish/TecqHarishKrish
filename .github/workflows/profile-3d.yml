name: GitHub 3D Contribution Graph

on:
schedule:
- cron: "0 0 * * *"   # runs every day at midnight UTC
workflow_dispatch:      # allows manual run

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest
name: Generate 3D Contribution Graph

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Generate 3D contribution graph
    uses: yoshi389111/github-profile-3d-contrib@0.7.2
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      USERNAME: TecqHarishKrish
      SETTINGS: >
        {
          "theme": "night_view",
          "output": "./profile-3d-contrib"
        }

  - name: Commit & Push the generated SVG
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"
      git add .
      git commit -m "update 3d contribution graph" || echo "no changes"
      git push
```
